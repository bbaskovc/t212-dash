<!DOCTYPE html>
<html lang="en" {% block html_attribute %}{% endblock html_attribute %}>
<head>
  <!-- Title Meta -->
  <meta charset="utf-8"/>
  <title> {% block title %}{% endblock title %} | HOMER - Responsive Bootstrap 5 Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
        content="admin dashboard template on WrapBootstrap. Perfect for building CRM, CMS, project management tools, and custom web apps with clean UI, responsive design, and powerful features.">
  <meta name="keywords"
        content="HOMER, Admin dashboard, WrapBootstrap, HTML template, Bootstrap admin, CRM template, CMS template, responsive admin, web app UI, admin theme, best admin template">
  <meta name="author" content="WebAppLayers">
  <link rel="shortcut icon" href="{{ config.ASSETS_ROOT }}/images/favicon.ico">

  {% block css %}

  {% block extra_css %} {% endblock extra_css %}

  <!-- =========css=========== -->
  <!-- Theme Config Js -->
  <script src="{{ config.ASSETS_ROOT }}/js/config.js"></script>
  <!-- Vendor css -->
  <link href="{{ config.ASSETS_ROOT }}/css/vendors.min.css" rel="stylesheet" type="text/css">
  <!-- App css -->
  <link href="{{ config.ASSETS_ROOT }}/css/app.min.css" rel="stylesheet" type="text/css">

  {% endblock css %}

</head>
<body {% block body_attribute %}{% endblock body_attribute %}>

{% block preloader %}{% endblock %}

{% block content %}{% endblock content %}

{% block javascript %}

<!-- =======js================ -->
<!-- Vendor js -->
<script src="{{ config.ASSETS_ROOT }}/js/vendors.min.js"></script>
<!-- App js -->
<script src="{{ config.ASSETS_ROOT }}/js/app.js"></script>

{% block extra_javascript %} {% endblock extra_javascript %}

{% endblock javascript %}

</body>
</html>
