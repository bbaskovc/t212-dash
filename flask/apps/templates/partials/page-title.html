{% if title %}
<div class="page-title-head d-flex align-items-center" id="page-head-box">
    <div class="flex-grow-1">
        <h4 class="fs-lg fw-bold mb-2 lh-1">{{ title }}</h4>
        <p class="text-muted mb-0 fs-xs lh-1">Built for Speed. Designed for Control.</p>
    </div>

    <div class="text-end">
        <button type="button" class="btn btn-link fs-16 mb-1 p-0" id="btn-page-head"><i data-lucide="square-arrow-up-right" class="btn-page-head-icon"></i></button>
        <ol class="breadcrumb m-0 py-0 fs-xs">
            <li class="breadcrumb-item"><a href="javascript: void(0);">Homer</a></li>
           {% if subtitle %}
            <li class="breadcrumb-item"><a href="javascript: void(0);">{{ subtitle }}</a></li>
            {% endif %}
            <li class="breadcrumb-item active">{{ title }}</li>
        </ol>
    </div>
</div>
{% endif %}
