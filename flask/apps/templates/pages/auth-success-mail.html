{% extends 'layouts/vertical.html' %}

{% block title %}Success Mail{% endblock title %}

{% block content %}

<div class="color-line"></div>
<a href="/index"
   class="btn d-none d-lg-block btn-dark position-absolute z-1 m-3">Back to Dashboard</a>
<div class="auth-box overflow-hidden align-items-center d-flex">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xxl-4 col-md-6 col-sm-8">
        <div class="card">
          <div class="card-body">
            <div class="auth-brand text-center mb-4">
              <a href="/index" class="logo-dark">
                <img src="{{ config.ASSETS_ROOT }}/images/logo-black.png" alt="dark logo" height="32">
              </a>
              <a href="/index" class="logo-light">
                <img src="{{ config.ASSETS_ROOT }}/images/logo.png" alt="logo" height="32">
              </a>
              <p class="mt-3 text-muted w-lg-75 mx-auto">Awesome! You’ve read the important message like a pro.</p>
            </div>

            <form>
              <div class="mb-4">
                <div class="avatar-xxl mx-auto mt-2">
                  <div class="avatar-title bg-light-subtle border border-light border-dashed rounded-circle">
                    <img src="{{ config.ASSETS_ROOT }}/images/checkmark.png" alt="dark logo" height="64">
                  </div>
                </div>
              </div>

              <h4 class="fw-bold text-center mb-4">Well Done! Email verified Successfully</h4>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary fw-semibold py-2">Bake to Dashboard</button>
              </div>
            </form>
          </div>
        </div>

        <p class="text-center text-muted mt-4 mb-0">
          © 2015 -
          <script>document.write(new Date().getFullYear())</script>
          HOMER — by <span class="fw-semibold">WebAppLayers</span>
        </p>
      </div>
    </div>
  </div>
</div>

{% endblock content %}
