{% extends 'layouts/base.html' %}

{% block title %}500 Error{% endblock title %}

{% block content %}

<div class="auth-box overflow-hidden align-items-center d-flex">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xxl-4 col-md-6 col-sm-8">
        <div class="card">
          <div class="card-body">
            <div class="auth-brand text-center mb-3">
              <a href="/index" class="logo-dark">
                <img src="{{ config.ASSETS_ROOT }}/images/logo-black.png" alt="dark logo" height="30">
              </a>
              <a href="/index" class="logo-light">
                <img src="{{ config.ASSETS_ROOT }}/images/logo.png" alt="logo" height="30">
              </a>
            </div>

            <div class="p-2 text-center">
              <div class="shadow-dance-text">500</div>
              <h3 class="fw-bold text-uppercase">Internal Server Error</h3>
              <p class="text-muted">Something went wrong on our end. Please try again later.</p>

              <button class="btn btn-primary mt-3 rounded-pill"
                      onclick="window.location.href='/index' %}'">Go Home
              </button>

            </div>
          </div>
        </div>

        <p class="text-center text-muted mt-5 mb-0">
          © 2015 -
          <script>document.write(new Date().getFullYear())</script>
          HOMER — by <span class="fw-semibold">WebAppLayers</span>
        </p>
      </div>
    </div>
  </div>
</div>

{% endblock content %}
